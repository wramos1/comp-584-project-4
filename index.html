<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Calculator App</title>

  <!-- import the webpage's stylesheet -->
  <link rel="stylesheet" href="./style.css">

</head>

<body>
  <div class="wrapper">
    <section class="calculator-screen">
      <p class="prev-equation"></p>
      <p class="calculator-value">0</p>
    </section>

    <section class="calculator-buttons">
      <button class="clear">C</button>
      <button class="backspace">&#x232B;</button>
      <button class="divide">&#247;</button>
      <button class="multiply">x</button>
      <button class="subtract">-</button>
      <button class="add">+</button>
      <button class="equals">=</button>
      <div class="numbers"></div>
    </section>
  </div>
</body>

<script src="./script.js"></script>

</html>
